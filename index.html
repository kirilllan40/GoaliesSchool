<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/reset.css">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <title>GoaliesSchool</title>
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <div class="container">
                <div class="header__wrapper">
                    <img class="header__logo" src="img/logo/goaliesschoollogo.jpg" alt="Логотип компании">   
                        <ul class="header__list">
                            <li class="header__list-item"><a class="list__item-link" href="#">О школе</a></li>
                            <li class="header__list-item"><a class="list__item-link" href="#">Программы</a></li>
                            <li class="header__list-item"><a class="list__item-link" href="#">Галерея</a></li>
                            <li class="header__list-item"><a class="list__item-link" href="#">Тренеры</a></li>
                        </ul>
                        <a class="burger-icon" href="#">
                            <span></span>
                        </a>
                </div>
            </div>
        </header>
        <!-- -------------------------->
        <main class="main">
            <section class="about">
                <div class="container">
                    <div class="about__wrapper">
                        <h1 class="about__title">Вратарская школа хоккея</h1>
                        <img class="about__logo" src="img/logo/goaliesschoollogotransp.png" alt="Логотип компании">
                    </div>
                </div>
            </section>
            <section class="school">
                <div class="container">
                    <img class="school__border-top" src="img/icons/goaliesborder1.png"></img>
                    <div class="school__wrapper">
                        <div class="school__title">
                            <h2 class="school__title-text">О школе</h2>
                            <ul class="school__title-list">
                                <li class="title__list-item">Индивидульные тренировки</li>
                                <li class="title__list-item">Современные методики</li>
                                <li class="title__list-item">Опытные тренеры</li>
                                <li class="title__list-item">Работа на результат</li>
                            </ul>
                        </div>
                        <img class="school__img" src="img/images-pictures/goalieschoolimg1.jpg" alt="Фото с тренировки">
                        <img class="school__border-bot" src="img/icons/goaliesborder1.png"></img>
                    </div>
                </div>
            </section>
        </main>
        <!-- -------------------------->
        <footer class="footer"></footer>
    </div>
    <script src="JS/main.js"></script>
</body>

</html>
